name: aios-ci

on:
  push:
    paths:
      - "aios/**"
  pull_request:
    paths:
      - "aios/**"

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run local CI smoke target
        run: make ci-smoke

      - name: Generate benchmark report
        run: make report

  memory-profile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with memory extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[memory]"

      - name: Run tests on memory profile
        run: make test

      - name: Run doctor checks (includes memory backend read/write)
        run: PYTHONPATH=src python -m aios_core.cli doctor

name: aios-ci

on:
  push:
    paths:
      - "aios/**"
  pull_request:
    paths:
      - "aios/**"

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run local CI smoke target
        run: make ci-smoke

      - name: Generate benchmark report
        run: make report

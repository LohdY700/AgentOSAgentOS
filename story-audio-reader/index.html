<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story Audio Reader</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 920px; margin: 24px auto; padding: 0 14px; }
    textarea { width: 100%; min-height: 240px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
    button, select, input { padding: 8px; }
    #status { color: #444; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>📖 Story Audio Reader</h1>
  <p>Dán truyện vào ô bên dưới rồi bấm <b>Đọc</b>. App dùng giọng đọc của trình duyệt (Web Speech API).</p>

  <div class="card">
    <textarea id="story" placeholder="Dán nội dung truyện vào đây..."></textarea>
    <div class="row">
      <input id="imgFile" type="file" accept="image/*" />
      <button id="ocrBtn">🖼 OCR từ ảnh</button>
      <input id="wikiTitle" placeholder="Tiêu đề truyện để lưu Wiki" />
      <input id="wikiTags" placeholder="tags,vd: fairy,vn" />
      <button id="saveWikiBtn">💾 Lưu vào Wiki</button>
      <select id="mode">
        <option value="browser">Giọng trình duyệt</option>
        <option value="server">Giọng vùng miền (FPT)</option>
      </select>
      <select id="region">
        <option value="bac">Nữ miền Bắc</option>
        <option value="trung">Nữ miền Trung</option>
        <option value="nam">Nữ miền Nam</option>
      </select>
      <select id="voice"></select>
      <label>Tốc độ <input id="rate" type="range" min="0.6" max="1.4" step="0.05" value="1" /></label>
      <button id="readBtn">▶️ Đọc</button>
      <button id="pauseBtn">⏸ Tạm dừng</button>
      <button id="resumeBtn">⏯ Tiếp tục</button>
      <button id="stopBtn">⏹ Dừng</button>
      <button id="sampleBtn">Nạp mẫu Tấm Cám</button>
    </div>
    <div id="status">Sẵn sàng.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const synth = window.speechSynthesis;
    const voiceEl = document.getElementById('voice');
    const storyEl = document.getElementById('story');
    const statusEl = document.getElementById('status');
    const rateEl = document.getElementById('rate');

    let voices = [];
    let queue = [];
    let idx = 0;

    function setStatus(t){ statusEl.textContent = t; }

    function loadVoices() {
      voices = synth.getVoices();
      voiceEl.innerHTML = '';
      voices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        if ((v.lang || '').toLowerCase().startsWith('vi')) opt.selected = true;
        voiceEl.appendChild(opt);
      });
    }

    function splitChunks(text) {
      return text
        .split(/\n\s*\n|\n+/g)
        .map(x => x.trim())
        .filter(Boolean);
    }

    function speakNext() {
      if (idx >= queue.length) {
        setStatus('Đọc xong ✅');
        return;
      }
      const u = new SpeechSynthesisUtterance(queue[idx]);
      const v = voices[Number(voiceEl.value)] || voices[0];
      if (v) u.voice = v;
      u.rate = Number(rateEl.value || 1);
      u.onend = () => {
        idx += 1;
        setStatus(`Đang đọc đoạn ${idx}/${queue.length}`);
        speakNext();
      };
      u.onerror = () => {
        idx += 1;
        speakNext();
      };
      synth.speak(u);
    }

    async function speakViaServer(text, voiceKey) {
      setStatus('Đang tạo audio giọng vùng miền...');
      const res = await fetch('/api/story/tts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, voice: voiceKey })
      });
      if (!res.ok) {
        let msg = 'TTS server lỗi';
        try { const j = await res.json(); msg = j.error || msg; } catch {}
        throw new Error(msg);
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); setStatus('Đọc xong ✅'); };
      audio.play();
      setStatus('Đang phát audio server...');
    }

    document.getElementById('readBtn').onclick = async () => {
      const t = storyEl.value.trim();
      if (!t) return setStatus('Chưa có nội dung truyện.');
      const mode = document.getElementById('mode').value;
      if (mode === 'server') {
        try {
          const vk = document.getElementById('region').value || 'bac';
          await speakViaServer(t.slice(0, 4000), vk);
        } catch (e) {
          setStatus('Lỗi giọng vùng miền: ' + ((e && e.message) || e));
        }
        return;
      }
      synth.cancel();
      queue = splitChunks(t);
      idx = 0;
      setStatus(`Bắt đầu đọc ${queue.length} đoạn...`);
      speakNext();
    };

    document.getElementById('pauseBtn').onclick = () => { synth.pause(); setStatus('Đã tạm dừng.'); };
    document.getElementById('resumeBtn').onclick = () => { synth.resume(); setStatus('Tiếp tục đọc...'); };
    document.getElementById('stopBtn').onclick = () => { synth.cancel(); setStatus('Đã dừng.'); };

    document.getElementById('saveWikiBtn').onclick = async () => {
      const title = (document.getElementById('wikiTitle').value || '').trim();
      const tags = (document.getElementById('wikiTags').value || '').trim();
      const content = (storyEl.value || '').trim();
      if (!title || !content) return setStatus('Cần tiêu đề + nội dung để lưu wiki.');
      setStatus('Đang lưu vào wiki...');
      try {
        const res = await fetch('/api/wiki/ingest', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ title, content, tags })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'save failed');
        setStatus('Đã lưu wiki ✅: ' + (data.path || 'ok'));
      } catch (e) {
        setStatus('Lưu wiki lỗi: ' + ((e && e.message) || e));
      }
    };

    document.getElementById('ocrBtn').onclick = async () => {
      const f = document.getElementById('imgFile').files?.[0];
      if (!f) return setStatus('Chọn file ảnh trước đã sếp.');
      if (!window.Tesseract) return setStatus('Thiếu OCR engine (Tesseract).');
      setStatus('Đang OCR ảnh...');
      try {
        const { data } = await Tesseract.recognize(f, 'vie+eng', {
          logger: (m) => {
            if (m && m.status) {
              const p = m.progress ? Math.round(m.progress * 100) : 0;
              setStatus(`OCR: ${m.status} ${p}%`);
            }
          }
        });
        storyEl.value = (data && data.text ? data.text : '').trim();
        setStatus(storyEl.value ? 'OCR xong ✅ Đã nạp text vào ô truyện.' : 'OCR xong nhưng chưa nhận diện được chữ.');
      } catch (e) {
        setStatus('OCR lỗi: ' + ((e && e.message) || e));
      }
    };

    document.getElementById('sampleBtn').onclick = () => {
      storyEl.value = `Ngày xửa ngày xưa, có hai chị em cùng cha khác mẹ là Tấm và Cám.\n\nTấm hiền lành, chăm chỉ nhưng bị dì ghẻ bắt làm việc nặng nhọc.\n\nNhờ sự giúp đỡ của Bụt, Tấm vượt qua nhiều thử thách...`;
      setStatus('Đã nạp mẫu truyện.');
    };

    loadVoices();
    if ('onvoiceschanged' in synth) synth.onvoiceschanged = loadVoices;
  </script>
</body>
</html>
